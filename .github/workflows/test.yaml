name: Create an S3 Bucket

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  id-token: write   
  contents: read

# Thêm biến môi trường ở cấp độ Global để tắt cảnh báo Node.js 20 của GitHub
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  # Định nghĩa luôn biến TF_VAR_ ở đây để cả Plan và Apply đều tự động nhận diện
  TF_VAR_bucket_name: ${{ secrets.BUCKET_NAME }}

jobs:
  Create-bucket:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        
      - name: Set up AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4 # Cập nhật lên v4 (ổn định nhất hiện tại)
        with:
          role-to-assume: ${{ secrets.IAM_ROLE }}
          aws-region: ${{ secrets.AWS_REGION }}
          
      - name: Install Terraform
        uses: hashicorp/setup-terraform@v3
        
      - name: Initialize Terraform
        run: terraform init
        working-directory: terraform
      
      - name: Terraform Plan
        # Sử dụng cờ -out=tfplan để xuất kết quả ra file
        run: terraform plan -out=tfplan
        working-directory: terraform

      - name: Terraform Apply
        # Chạy apply dựa trên đúng file tfplan vừa tạo, không cần -auto-approve nữa
        run: terraform apply tfplan
        working-directory: terraform

      - name: Upload Files to S3 Bucket
        run: |
          aws s3 cp index.html s3://${{ secrets.BUCKET_NAME }}/index.html
          aws s3 cp --recursive images/ s3://${{ secrets.BUCKET_NAME }}/images/
          aws s3 cp --recursive styles/ s3://${{ secrets.BUCKET_NAME }}/styles/

